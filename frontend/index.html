<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Encuesta Inteligente</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h2>Encuesta de Perfil</h2>

  <!-- Barra de progreso -->
  <div class="progress-bar">
    <div id="progressFill"></div>
  </div>

  <form id="surveyForm">

    <!-- PASO 1 -->
    <div class="step">
      <label>Edad:</label>
      <input type="number" id="edad" placeholder="Ingresa tu edad">
    </div>

    <!-- PASO 2 -->
    <div class="step">
      <label>¿Trabajas?</label>
      <select id="trabaja">
        <option value="">Selecciona</option>
        <option value="si">Sí</option>
        <option value="no">No</option>
      </select>
    </div>

    <!-- PASO 3 (CONDICIONAL) -->
    <div class="step">

      <div id="salarioContainer" class="hidden">
        <label>Salario:</label>
        <input type="number" id="salario">
      </div>

      <div id="estudioContainer" class="hidden">
        <label>¿Qué estudias?</label>
        <input type="text" id="estudio">
      </div>

      <div id="hobbiesContainer" class="hidden">
        <label>¿Qué haces en tu tiempo libre?</label>
        <input type="text" id="hobbies">
      </div>

    </div>

    <!-- PASO 4 -->
    <div class="step">
      <label>¿Te gustan las encuestas?</label>
      <select id="gusta">
        <option value="">Selecciona</option>
        <option value="si">Sí</option>
        <option value="no">No</option>
      </select>
    </div>

    <!-- BOTONES -->
    <div class="buttons">
      <button type="button" id="prev">Anterior</button>
      <button type="button" id="next">Siguiente</button>
      <button type="submit" id="submitBtn">Finalizar</button>
    </div>

  </form>

  <p id="mensaje"></p>
</div>

<script src="script.js"></script>
</body>
</html>
